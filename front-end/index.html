<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wardrobe Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="desktop-stage">
      <div class="phone-shell">
        <div class="phone-glow"></div>
        <div class="phone-bezel">
          <div class="phone-notch"></div>
          <div class="app-shell">
            <header class="status-bar" aria-hidden="true">
              <span>9:41</span>
              <div class="status-icons">
                <span></span>
                <span></span>
                <span></span>
              </div>
            </header>

            <main id="app" class="app-content"></main>

            <nav class="tab-bar" aria-label="Primary">
              <button class="tab-button active" data-tab="explore">
                <span class="tab-icon">✦</span>
                <span class="tab-label">Explore</span>
              </button>
              <button class="tab-button" data-tab="closet">
                <span class="tab-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20.38 18H3.62a1 1 0 0 1-.74-1.67L12 6l9.12 10.33A1 1 0 0 1 20.38 18z"/>
                    <path d="M12 2v4"/>
                    <circle cx="12" cy="6" r="1"/>
                  </svg>
                </span>
                <span class="tab-label">Closet</span>
              </button>
              <button class="tab-button" data-tab="inbox">
                <span class="tab-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                  </svg>
                </span>
                <span class="tab-label">Inbox</span>
              </button>
              <button class="tab-button" data-tab="profile">
                <span class="tab-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                  </svg>
                </span>
                <span class="tab-label">Profile</span>
              </button>
            </nav>
          </div>
        </div>
      </div>
    </div>

    <div id="detail-modal" class="detail-modal hidden" aria-hidden="true"></div>

    <script src="./app.js" defer></script>
  </body>
</html>
